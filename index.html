<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hurricane Resilience Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🌀 Hurricane Resilience: Miami Defense</h1>
            <div class="header-stats">
                <div>Year: <span id="year">2025</span></div>
                <div>Week: <span id="week">1</span></div>
                <div>Status: <span id="status">Normal</span></div>
            </div>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div class="viz">
                    <div class="house">
                        <div class="roof">Roof</div>
                        <div class="floor2">2nd Floor</div>
                        <div class="floor1">1st Floor</div>
                        <div class="floor0">Ground</div>
                    </div>
                    <div class="water" id="water"></div>
                </div>
                <div class="stats">
                    <h3>Systems</h3>
                    <div id="systems"></div>
                </div>
            </div>

            <div class="right-panel">
                <div class="forecast">
                    <h3>Forecast</h3>
                    <div id="forecast"></div>
                </div>
                <div class="news">
                    <h3>News</h3>
                    <div id="news">Loading...</div>
                </div>
                <div class="defenses">
                    <h3>Defenses</h3>
                    <div id="defensesList"></div>
                </div>
            </div>
        </div>

        <div class="resource-bar">
            <span>Budget: <span id="elixir">2</span>/20</span>
            <div class="meter"><div class="fill" id="fill"></div></div>
        </div>

        <div class="cards">
            <h3>Defenses</h3>
            <div id="cardsGrid"></div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
